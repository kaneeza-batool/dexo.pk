<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — dexo.pk</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .auth-bg-deco {
        position: absolute;
        width: 300px;
        height: 300px;
        border: 1px solid rgba(200, 169, 106, 0.15);
        border-radius: 50%;
      }
      .social-login-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 11px 20px;
        border: 1.5px solid var(--border);
        border-radius: 50px;
        font-family: "Poppins", sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        background: white;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
      }
      .social-login-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
    </style>
  </head>
  <body>
    <div class="auth-wrap">
      <!-- Decorative circles -->
      <div class="auth-bg-deco" style="top: -80px; left: -80px"></div>
      <div
        class="auth-bg-deco"
        style="bottom: -100px; right: -60px; width: 200px; height: 200px"
      ></div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-sm-10 col-md-8 col-lg-5">
            <div class="auth-card">
              <!-- Logo -->
              <div class="auth-logo">dexo.pk</div>
              <div class="auth-subtitle">
                Welcome back. Sign in to your account.
              </div>

              <!-- Social Login -->
              <div class="d-flex flex-column gap-3 mb-4">
                <button class="social-login-btn">
                  <svg width="18" height="18" viewBox="0 0 48 48">
                    <path
                      fill="#EA4335"
                      d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
                    />
                    <path
                      fill="#4285F4"
                      d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
                    />
                    <path
                      fill="#FBBC05"
                      d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
                    />
                    <path
                      fill="#34A853"
                      d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
                    />
                  </svg>
                  Continue with Google
                </button>
              </div>

              <div class="auth-divider"><span>or sign in with email</span></div>

              <!-- Login Form -->
              <form id="login-form">
                <div class="mb-3">
                  <label class="form-label">Email Address</label>
                  <div class="input-icon-wrap">
                    <i class="bi bi-envelope icon"></i>
                    <input
                      type="email"
                      class="form-control"
                      placeholder="aisha@example.com"
                      required
                    />
                  </div>
                </div>
                <div class="mb-4">
                  <div
                    class="d-flex justify-content-between align-items-center mb-1"
                  >
                    <label class="form-label mb-0">Password</label>
                    <a href="#" style="font-size: 12px; color: var(--gold)"
                      >Forgot password?</a
                    >
                  </div>
                  <div class="input-icon-wrap">
                    <i class="bi bi-lock icon"></i>
                    <input
                      type="password"
                      class="form-control"
                      placeholder="••••••••"
                      required
                    />
                  </div>
                </div>
                <div class="mb-4 d-flex align-items-center gap-2">
                  <input
                    type="checkbox"
                    id="remember"
                    style="accent-color: var(--gold); width: 14px; height: 14px"
                  />
                  <label
                    for="remember"
                    style="
                      font-size: 13px;
                      color: var(--text-muted);
                      cursor: pointer;
                    "
                    >Remember me for 30 days</label
                  >
                </div>
                <button
                  type="submit"
                  class="btn-gold w-100"
                  style="justify-content: center; padding: 13px"
                >
                  <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
              </form>

              <div
                class="text-center mt-4"
                style="font-size: 13px; color: var(--text-muted)"
              >
                Don't have an account?
                <a
                  href="signup.html"
                  style="color: var(--gold); font-weight: 600"
                  >Create one</a
                >
              </div>
            </div>

            <!-- Back to shop -->
            <div class="text-center mt-4">
              <a
                href="index.html"
                style="font-size: 13px; color: var(--text-muted)"
              >
                <i class="bi bi-arrow-left me-1"></i> Back to dexo.pk
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
